services:
  - type: web
    name: cyberreport
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_FILE_PATH
        value: /tmp/cyberreport-sessions.json
      - key: DB_SSL
        value: true
