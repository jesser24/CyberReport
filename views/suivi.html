<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi d'incident – CyberReport</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    .status-timeline {
      display: flex;
      align-items: center;
      margin: 20px 0;
      flex-wrap: wrap;
      gap: 4px;
    }
    .status-step {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      border: 2px solid #21262d;
      color: #8b949e;
      background: #0d1117;
      flex-shrink: 0;
    }
    .status-dot.active {
      background: #0077b6;
      border-color: #0077b6;
      color: white;
    }
    .status-dot.done {
      background: #28a745;
      border-color: #28a745;
      color: white;
    }
    .status-connector {
      width: 30px; height: 2px;
      background: #21262d;
    }
    .status-connector.done { background: #28a745; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="py-5">
    <div class="container" style="max-width:700px;">

      <!-- Titre -->
      <div class="text-center mb-5">
        <span class="badge px-3 py-2 mb-3" style="background:rgba(79,195,247,.1);color:#4fc3f7;border:1px solid rgba(79,195,247,.3);border-radius:20px;font-size:.8rem;">
          SUIVI D'INCIDENT
        </span>
        <h1 class="display-6 fw-bold">Suivre mon incident</h1>
        <p style="color:#8b949e;">Entrez votre email et votre numéro de ticket pour consulter l'état de votre signalement.</p>
      </div>

      <!-- Formulaire de recherche -->
      <div class="cr-card mb-4">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Adresse email</label>
            <input type="email" id="search-email" class="form-control" placeholder="jean.dupont@entreprise.fr">
          </div>
          <div class="col-md-6">
            <label class="form-label">Numéro de ticket</label>
            <input type="text" id="search-ticket" class="form-control" placeholder="INC-2026-0001">
          </div>
          <div class="col-12">
            <button class="btn btn-cr-primary w-100 py-2" onclick="searchIncident()">
              <i class="fas fa-search me-2"></i>Rechercher mon incident
            </button>
          </div>
        </div>
        <div id="search-error" class="mt-3" style="display:none;color:#f08080;font-size:.875rem;text-align:center;"></div>
      </div>

      <!-- Résultat -->
      <div id="result-panel" style="display:none;">
        <div class="cr-card" style="border-color:rgba(79,195,247,.2);">

          <!-- Header résultat -->
          <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-4">
            <div>
              <div style="font-size:.75rem;color:#8b949e;margin-bottom:4px;">TICKET</div>
              <div id="res-ticket" style="font-size:1.4rem;font-weight:800;color:#4fc3f7;letter-spacing:1px;"></div>
            </div>
            <div id="res-statut-badge"></div>
          </div>

          <!-- Timeline de statut -->
          <div class="mb-4">
            <div style="font-size:.8rem;color:#8b949e;margin-bottom:10px;">PROGRESSION</div>
            <div class="status-timeline" id="status-timeline"></div>
          </div>

          <!-- Détails -->
          <div class="row g-3">
            <div class="col-md-6">
              <div style="font-size:.75rem;color:#8b949e;margin-bottom:3px;">DÉCLARANT</div>
              <div id="res-nom" style="font-weight:500;"></div>
            </div>
            <div class="col-md-6">
              <div style="font-size:.75rem;color:#8b949e;margin-bottom:3px;">TYPE D'INCIDENT</div>
              <div id="res-type" style="font-weight:500;"></div>
            </div>
            <div class="col-md-6">
              <div style="font-size:.75rem;color:#8b949e;margin-bottom:3px;">GRAVITÉ</div>
              <div id="res-gravite"></div>
            </div>
            <div class="col-md-6">
              <div style="font-size:.75rem;color:#8b949e;margin-bottom:3px;">APPAREIL</div>
              <div id="res-appareil" style="font-weight:500;"></div>
            </div>
            <div class="col-md-6">
              <div style="font-size:.75rem;color:#8b949e;margin-bottom:3px;">DATE DE SIGNALEMENT</div>
              <div id="res-date" style="font-weight:500;"></div>
            </div>
            <div class="col-md-6">
              <div style="font-size:.75rem;color:#8b949e;margin-bottom:3px;">DERNIÈRE MISE À JOUR</div>
              <div id="res-update" style="font-weight:500;"></div>
            </div>
          </div>

          <!-- Message selon statut -->
          <div id="status-message" class="mt-4 p-3 cr-card" style="font-size:.875rem;"></div>
        </div>
      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const STATUTS_ORDER = ['Nouveau', 'En cours', 'En attente', 'Résolu', 'Fermé'];
    const STATUTS_ICONS = { 'Nouveau': 'N', 'En cours': 'C', 'En attente': 'A', 'Résolu': 'R', 'Fermé': 'F' };

    const GRAVITE_BADGES = {
      'Faible':   'badge badge-faible',
      'Moyen':    'badge badge-moyen',
      'Élevé':    'badge badge-eleve',
      'Critique': 'badge badge-critique pulse-critical'
    };

    const STATUT_BADGES = {
      'Nouveau':    'badge badge-nouveau',
      'En cours':   'badge badge-en-cours',
      'En attente': 'badge badge-en-attente',
      'Résolu':     'badge badge-resolu',
      'Fermé':      'badge badge-ferme'
    };

    const STATUT_MESSAGES = {
      'Nouveau': { bg: 'rgba(0,119,182,.1)', border: 'rgba(0,119,182,.3)', icon: 'N', text: 'Votre signalement a bien été reçu. Notre équipe va l\'analyser prochainement.' },
      'En cours': { bg: 'rgba(111,66,193,.1)', border: 'rgba(111,66,193,.3)', icon: 'C', text: 'Votre incident est en cours de traitement par notre équipe de sécurité.' },
      'En attente': { bg: 'rgba(253,126,20,.1)', border: 'rgba(253,126,20,.3)', icon: 'A', text: 'Le traitement est en attente d\'informations complémentaires ou d\'une action externe.' },
      'Résolu': { bg: 'rgba(40,167,69,.1)', border: 'rgba(40,167,69,.3)', icon: '✅', text: 'Excellent ! Votre incident a été résolu. Si le problème persiste, signalez un nouvel incident.' },
      'Fermé': { bg: 'rgba(73,80,87,.15)', border: 'rgba(73,80,87,.4)', icon: 'F', text: 'Ce ticket a été fermé. Si vous avez de nouvelles informations, merci d\'ouvrir un nouveau signalement.' }
    };

    async function searchIncident() {
      const email = document.getElementById('search-email').value.trim();
      const ticket = document.getElementById('search-ticket').value.trim();
      const errDiv = document.getElementById('search-error');

      errDiv.style.display = 'none';
      document.getElementById('result-panel').style.display = 'none';

      if (!email || !ticket) {
        errDiv.textContent = 'Veuillez renseigner votre email et votre numéro de ticket.';
        errDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/suivi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, ticket_number: ticket })
        });
        const data = await res.json();

        if (data.success) {
          displayResult(data.incident);
        } else {
          errDiv.textContent = data.message || 'Aucun incident trouvé.';
          errDiv.style.display = 'block';
        }
      } catch (e) {
        errDiv.textContent = 'Erreur réseau. Veuillez réessayer.';
        errDiv.style.display = 'block';
      }
    }

    function displayResult(inc) {
      document.getElementById('res-ticket').textContent = inc.ticket_number;
      document.getElementById('res-nom').textContent = `${inc.prenom} ${inc.nom}`;
      document.getElementById('res-type').textContent = inc.type_incident;
      document.getElementById('res-appareil').textContent = inc.appareil || 'Non spécifié';
      document.getElementById('res-date').textContent = new Date(inc.date_creation).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' });
      document.getElementById('res-update').textContent = new Date(inc.date_modification).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' });

      // Badge gravité
      document.getElementById('res-gravite').innerHTML = `<span class="${GRAVITE_BADGES[inc.gravite] || 'badge bg-secondary'}">${inc.gravite}</span>`;

      // Badge statut
      document.getElementById('res-statut-badge').innerHTML =
        `<span class="${STATUT_BADGES[inc.statut] || 'badge bg-secondary'} px-3 py-2" style="font-size:.9rem;">${STATUTS_ICONS[inc.statut] || ''} ${inc.statut}</span>`;

      // Timeline
      const currentIdx = STATUTS_ORDER.indexOf(inc.statut);
      let timelineHtml = '';
      STATUTS_ORDER.forEach((s, i) => {
        const isDone = i < currentIdx;
        const isActive = i === currentIdx;
        const dotClass = isDone ? 'done' : (isActive ? 'active' : '');
        timelineHtml += `
          <div class="status-step">
            <div class="status-dot ${dotClass}" title="${s}">
              ${isDone ? '<i class="fas fa-check"></i>' : (i + 1)}
            </div>
            <div style="font-size:.65rem;color:${isActive ? '#4fc3f7' : (isDone ? '#28a745' : '#8b949e')};margin-left:2px;">${s}</div>
          </div>`;
        if (i < STATUTS_ORDER.length - 1) {
          timelineHtml += `<div class="status-connector ${isDone ? 'done' : ''}"></div>`;
        }
      });
      document.getElementById('status-timeline').innerHTML = timelineHtml;

      // Message statut
      const msg = STATUT_MESSAGES[inc.statut];
      if (msg) {
        document.getElementById('status-message').innerHTML =
          `<span style="margin-right:8px;">${msg.icon}</span>${msg.text}`;
        document.getElementById('status-message').style.background = msg.bg;
        document.getElementById('status-message').style.borderColor = msg.border;
      }

      document.getElementById('result-panel').style.display = 'block';
    }

    // Pré-remplir depuis l'URL (ex: /suivi?ticket=INC-2026-0001&email=...)
    const params = new URLSearchParams(window.location.search);
    if (params.get('ticket')) document.getElementById('search-ticket').value = params.get('ticket');
    if (params.get('email')) document.getElementById('search-email').value = params.get('email');
    if (params.get('ticket') && params.get('email')) searchIncident();

    // Soumission au Enter
    ['search-email', 'search-ticket'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') searchIncident();
      });
    });
  </script>
</body>
</html>
