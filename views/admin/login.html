<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin – CyberReport</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    body { background: transparent; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card {
      width: 100%; max-width: 420px;
      background: #161b27;
      border: 1px solid #21262d;
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 26px 70px rgba(0,0,0,.32);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .shield { font-size: 3rem; }
    .login-logo h1 { font-size: 1.6rem; font-weight: 800; margin: 8px 0 4px; }
    .login-logo p { color: #8b949e; font-size: .875rem; }
    .input-group-text {
      background: #0d1117;
      border: 1px solid #21262d;
      border-right: none;
      color: #8b949e;
    }
    .input-group .form-control { border-left: none; }
    .input-group .form-control:focus { border-left: none; }
    .input-group:focus-within .input-group-text {
      border-color: #4fc3f7;
    }
  </style>
</head>
<body class="admin-auth-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="badge px-3 py-2 mb-3" style="background:rgba(103,232,249,.10);color:#9be5ff;border:1px solid rgba(103,232,249,.18);border-radius:999px;">Administration sécurisée</div>
      <div class="shield"><i class="fas fa-shield-alt"></i></div>
      <h1>Cyber<span style="color:#4fc3f7;">Report</span></h1>
      <p>Panneau d'administration</p>
    </div>

    <div id="login-error" class="mb-3 p-3" style="display:none;background:#3a1a1a;border:1px solid #dc3545;color:#f08080;border-radius:8px;font-size:.875rem;"></div>

    <div class="mb-3">
      <label class="form-label">Adresse email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
        <input type="email" id="login-email" class="form-control" placeholder="admin@cyberreport.fr" autofocus>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Mot de passe</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••">
        <button class="btn" type="button" id="toggle-pw"
                style="background:#0d1117;border:1px solid #21262d;border-left:none;color:#8b949e;">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn btn-cr-primary w-100 py-2" id="login-btn" onclick="doLogin()">
      <span id="login-text"><i class="fas fa-sign-in-alt me-2"></i>Se connecter</span>
      <span id="login-loading" style="display:none;"><span class="cr-spinner me-2"></span>Connexion...</span>
    </button>

    <div class="text-center mt-4">
      <a href="/" style="font-size:.8rem;color:#8b949e;text-decoration:none;">
        <i class="fas fa-arrow-left me-1"></i>Retour au site public
      </a>
    </div>

    <div class="mt-4 p-3 text-center" style="background:rgba(103,232,249,.06);border:1px solid rgba(103,232,249,.12);border-radius:18px;">
      <p style="font-size:.75rem;color:#8b949e;margin:0;">
        <strong style="color:#4fc3f7;">Démo :</strong><br>
        admin@cyberreport.fr / Admin@1234
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Afficher/cacher le mot de passe
    document.getElementById('toggle-pw').addEventListener('click', function() {
      const pw = document.getElementById('login-password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pw.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Connexion au Enter
    ['login-email','login-password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errDiv = document.getElementById('login-error');

      errDiv.style.display = 'none';
      document.getElementById('login-text').style.display = 'none';
      document.getElementById('login-loading').style.display = 'inline-flex';
      document.getElementById('login-btn').disabled = true;

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect || '/admin/dashboard';
        } else {
          errDiv.textContent = data.message || 'Identifiants incorrects.';
          errDiv.style.display = 'block';
        }
      } catch (e) {
        errDiv.textContent = 'Erreur réseau. Veuillez réessayer.';
        errDiv.style.display = 'block';
      } finally {
        document.getElementById('login-text').style.display = 'inline';
        document.getElementById('login-loading').style.display = 'none';
        document.getElementById('login-btn').disabled = false;
      }
    }
  </script>
</body>
</html>
