<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail incident – CyberReport Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { background: #0d1117; }
    .detail-card {
      background: #161b27;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 24px;
    }
    .info-row {
      display: flex;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      min-width: 0;
    }
    .info-label { color: #8b949e; font-size: .8rem; min-width: 160px; }
    .info-value {
      font-size: .9rem;
      font-weight: 500;
      min-width: 0;
      flex: 1;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .description-content,
    .comment-body {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .comment-item {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .comment-meta { font-size: .75rem; color: #8b949e; margin-bottom: 4px; }
    .comment-body { font-size: .875rem; line-height: 1.6; }
  </style>
</head>
<body class="admin-page">
  <div id="admin-navbar"></div>

  <div class="container-fluid px-4 py-4" id="page-content">
    <div class="text-center py-5" style="color:#8b949e;">
      <span class="cr-spinner me-2"></span>Chargement de l'incident...
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="cr-toast" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/admin-nav.js"></script>
  <script>
    const incidentId = window.location.pathname.split('/').pop();
    let incidentData = null;

    const GRAVITE_BADGE = {
      'Faible': 'badge-faible', 'Moyen': 'badge-moyen',
      'Élevé': 'badge-eleve', 'Critique': 'badge-critique'
    };
    const STATUT_BADGE = {
      'Nouveau': 'badge-nouveau', 'En cours': 'badge-en-cours',
      'En attente': 'badge-en-attente', 'Résolu': 'badge-resolu', 'Fermé': 'badge-ferme'
    };

    // ── Toast ────────────────────────────────────────────────────────────────

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.className = `cr-toast cr-toast-${type}`;
      t.innerHTML = `<span><i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-times-circle'}"></i></span><span>${msg}</span>`;
      t.style.display = 'flex';
      setTimeout(() => { t.style.display = 'none'; }, 3500);
    }

    // ── Chargement ────────────────────────────────────────────────────────────

    async function loadIncident() {
      const res = await fetch(`/admin/api/incidents/${incidentId}`);
      if (!res.ok) {
        window.location.href = '/admin/incidents';
        return;
      }
      const d = await res.json();
      incidentData = d.incident;
      renderPage(d.incident, d.comments);
    }

    function renderPage(inc, comments) {
      const formatDate = d => new Date(d).toLocaleDateString('fr-FR', {
        day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });

      document.getElementById('page-content').innerHTML = `
      <!-- En-tête -->
      <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
        <div>
          <div class="mb-1">
            <a href="/admin/incidents" style="font-size:.8rem;color:#8b949e;text-decoration:none;">
              <i class="fas fa-arrow-left me-1"></i>Retour à la liste
            </a>
          </div>
          <h4 class="fw-bold mb-1 d-flex flex-column gap-2">
            <code style="color:#4fc3f7;font-size:1.05rem;">${inc.ticket_number}</code>
            <span style="font-size:1.05rem;color:#f8fbff;">${escapeHtml(inc.titre_incident || 'Incident')}</span>
          </h4>
          <div class="d-flex gap-2 flex-wrap">
            <span class="badge ${GRAVITE_BADGE[inc.gravite] || 'bg-secondary'} ${inc.gravite === 'Critique' ? 'pulse-critical' : ''}">${inc.gravite}</span>
            <span class="badge ${STATUT_BADGE[inc.statut] || 'bg-secondary'}" id="current-statut-badge">${inc.statut}</span>
          </div>
        </div>
        <button class="btn btn-cr-primary btn-sm px-3" onclick="generatePDF()">
          <i class="fas fa-file-pdf me-2"></i>Télécharger PDF
        </button>
      </div>

      <div class="row g-3">
        <!-- Colonne gauche -->
        <div class="col-lg-8">

          <!-- Infos déclarant -->
          <div class="detail-card mb-3">
            <h6 style="color:#4fc3f7;margin-bottom:16px;"><i class="fas fa-user me-2"></i>Informations du déclarant</h6>
            <div class="info-row"><div class="info-label">Prénom / Nom</div><div class="info-value">${inc.prenom} ${inc.nom}</div></div>
            <div class="info-row"><div class="info-label">Email</div><div class="info-value"><a href="mailto:${inc.email}" style="color:#4fc3f7;">${inc.email}</a></div></div>
            <div class="info-row"><div class="info-label">Téléphone</div><div class="info-value">${inc.telephone || '<span style="color:#8b949e;">Non renseigné</span>'}</div></div>
            <div class="info-row" style="border:none;"><div class="info-label">Service</div><div class="info-value">${inc.service || '<span style="color:#8b949e;">Non renseigné</span>'}</div></div>
          </div>

          <!-- Détails incident -->
          <div class="detail-card mb-3">
            <h6 style="color:#4fc3f7;margin-bottom:16px;"><i class="fas fa-exclamation-triangle me-2"></i>Détails de l'incident</h6>
            <div class="info-row"><div class="info-label">Titre</div><div class="info-value">${escapeHtml(inc.titre_incident || 'Incident')}</div></div>
            <div class="info-row"><div class="info-label">Type d'incident</div><div class="info-value">${inc.type_incident}</div></div>
            <div class="info-row"><div class="info-label">Niveau de gravité</div><div class="info-value"><span class="badge ${GRAVITE_BADGE[inc.gravite] || 'bg-secondary'}">${inc.gravite}</span></div></div>
            <div class="info-row"><div class="info-label">Appareil concerné</div><div class="info-value">${inc.appareil || '<span style="color:#8b949e;">Non spécifié</span>'}</div></div>
            <div class="info-row"><div class="info-label">Date de signalement</div><div class="info-value">${formatDate(inc.date_creation)}</div></div>
            <div class="info-row" style="border:none;"><div class="info-label">Dernière modification</div><div class="info-value">${formatDate(inc.date_modification)}</div></div>
          </div>

          <!-- Description -->
          <div class="detail-card mb-3">
            <h6 style="color:#4fc3f7;margin-bottom:12px;"><i class="fas fa-align-left me-2"></i>Description</h6>
            <p class="description-content" style="color:#c9d1d9;line-height:1.8;font-size:.9rem;margin:0;white-space:pre-wrap;">${escapeHtml(inc.description)}</p>
          </div>

          ${inc.fichier ? `
          <div class="detail-card mb-3">
            <h6 style="color:#4fc3f7;margin-bottom:12px;"><i class="fas fa-paperclip me-2"></i>Pièce jointe</h6>
            <a href="/uploads/${inc.fichier}" target="_blank"
               class="d-inline-flex align-items-center gap-2 p-2 px-3"
               style="background:#0d1117;border:1px solid #21262d;border-radius:6px;color:#4fc3f7;text-decoration:none;font-size:.85rem;">
              <i class="fas fa-file"></i>${inc.fichier}
              <i class="fas fa-external-link-alt" style="font-size:.7rem;"></i>
            </a>
          </div>` : ''}

          <!-- Commentaires -->
          <div class="detail-card">
            <h6 style="color:#4fc3f7;margin-bottom:16px;"><i class="fas fa-comments me-2"></i>Commentaires (${comments.length})</h6>
            <div id="comments-list">
              ${comments.length ? comments.map(c => `
                <div class="comment-item">
                  <div class="comment-meta">
                    <strong style="color:#c9d1d9;">${c.admin_nom}</strong> ·
                    ${new Date(c.date).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}
                  </div>
                  <div class="comment-body">${escapeHtml(c.commentaire)}</div>
                </div>
              `).join('') : '<p style="color:#8b949e;font-size:.875rem;">Aucun commentaire pour le moment.</p>'}
            </div>

            <!-- Ajouter un commentaire -->
            <div class="mt-3 pt-3" style="border-top:1px solid #21262d;">
              <textarea id="new-comment" class="form-control mb-2" rows="3"
                        placeholder="Ajouter un commentaire (visible uniquement par les admins)..."></textarea>
              <button class="btn btn-cr-outline btn-sm" onclick="addComment()">
                <i class="fas fa-plus me-1"></i>Ajouter le commentaire
              </button>
            </div>
          </div>
        </div>

        <!-- Colonne droite : actions -->
        <div class="col-lg-4">
          <div class="detail-card mb-3">
            <h6 style="color:#4fc3f7;margin-bottom:16px;"><i class="fas fa-cog me-2"></i>Modifier le statut</h6>
            <p style="color:#8b949e;font-size:.8rem;margin-bottom:12px;">Statut actuel :</p>
            <div id="current-statut-display" class="mb-3">
              <span class="badge ${STATUT_BADGE[inc.statut] || 'bg-secondary'} px-3 py-2" style="font-size:.9rem;">${inc.statut}</span>
            </div>
            <div class="d-grid gap-2" id="statut-buttons">
              ${['Nouveau','En cours','En attente','Résolu','Fermé'].map(s => `
                <button class="btn btn-sm text-start ${s === inc.statut ? 'btn-cr-primary' : ''}"
                        style="${s !== inc.statut ? 'background:rgba(255,255,255,.03);border:1px solid #21262d;color:#c9d1d9;' : ''};border-radius:6px;font-size:.875rem;"
                        onclick="changeStatut('${s}')" id="statut-btn-${s.replace(' ','-')}">
                  ${s === inc.statut ? '▶ ' : ''}${s}
                </button>
              `).join('')}
            </div>
          </div>

          <!-- Infos techniques -->
          <div class="detail-card" style="font-size:.8rem;">
            <h6 style="color:#4fc3f7;margin-bottom:12px;"><i class="fas fa-info-circle me-2"></i>Informations techniques</h6>
            <div style="color:#8b949e;line-height:2;">
              <div>ID : <span style="color:#c9d1d9;">#${inc.id}</span></div>
              <div>Ticket : <code style="color:#4fc3f7;">${inc.ticket_number}</code></div>
              <div>Créé le : <span style="color:#c9d1d9;">${new Date(inc.date_creation).toLocaleDateString('fr-FR')}</span></div>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ── Changer statut ────────────────────────────────────────────────────────

    async function changeStatut(newStatut) {
      const res = await fetch(`/admin/api/incidents/${incidentId}/statut`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ statut: newStatut })
      });
      if (res.ok) {
        showToast(`Statut mis à jour : ${newStatut}`);
        // Met à jour l'UI sans recharger
        document.querySelectorAll('#statut-buttons button').forEach(btn => {
          const s = btn.textContent.trim().replace('▶ ', '');
          if (s === newStatut) {
            btn.className = 'btn btn-sm text-start btn-cr-primary';
            btn.style.cssText = 'border-radius:6px;font-size:.875rem;';
            btn.textContent = '▶ ' + newStatut;
          } else {
            btn.className = 'btn btn-sm text-start';
            btn.style.cssText = 'background:rgba(255,255,255,.03);border:1px solid #21262d;color:#c9d1d9;border-radius:6px;font-size:.875rem;';
            btn.textContent = s;
          }
        });
        const STATUT_BADGE = {
          'Nouveau': 'badge-nouveau', 'En cours': 'badge-en-cours',
          'En attente': 'badge-en-attente', 'Résolu': 'badge-resolu', 'Fermé': 'badge-ferme'
        };
        document.getElementById('current-statut-display').innerHTML =
          `<span class="badge ${STATUT_BADGE[newStatut]} px-3 py-2" style="font-size:.9rem;">${newStatut}</span>`;
      } else {
        showToast('Erreur lors de la mise à jour du statut.', 'error');
      }
    }

    // ── Ajouter un commentaire ────────────────────────────────────────────────

    async function addComment() {
      const commentaire = document.getElementById('new-comment').value.trim();
      if (!commentaire) return;

      const res = await fetch(`/admin/api/incidents/${incidentId}/commentaires`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ commentaire })
      });

      if (res.ok) {
        document.getElementById('new-comment').value = '';
        showToast('Commentaire ajouté.');
        // Recharge l'incident pour afficher le nouveau commentaire
        const d = await (await fetch(`/admin/api/incidents/${incidentId}`)).json();
        const list = document.getElementById('comments-list');
        list.innerHTML = d.comments.map(c => `
          <div class="comment-item">
            <div class="comment-meta">
              <strong style="color:#c9d1d9;">${c.admin_nom}</strong> ·
              ${new Date(c.date).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}
            </div>
            <div class="comment-body">${escapeHtml(c.commentaire)}</div>
          </div>
        `).join('');
      } else {
        showToast('Erreur lors de l\'ajout du commentaire.', 'error');
      }
    }

    // ── PDF ───────────────────────────────────────────────────────────────────

    function generatePDF() {
      if (!incidentData) return;
      const inc = incidentData;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();
      const margin = 20;

      // En-tête
      doc.setFillColor(13, 17, 23);
      doc.rect(0, 0, pageW, 40, 'F');
      doc.setTextColor(79, 195, 247);
      doc.setFontSize(20);
      doc.setFont('helvetica', 'bold');
      doc.text('CyberReport', margin, 18);
      doc.setFontSize(10);
      doc.setTextColor(139, 148, 158);
      doc.setFont('helvetica', 'normal');
      doc.text('Rapport de signalement d\'incident', margin, 27);
      doc.text('Généré par : Administration', pageW - margin - 50, 27);

      doc.setDrawColor(0, 119, 182);
      doc.setLineWidth(0.5);
      doc.line(margin, 42, pageW - margin, 42);

      doc.setFontSize(13);
      doc.setTextColor(40, 40, 40);
      doc.setFont('helvetica', 'bold');
      doc.text('Numéro de ticket :', margin, 55);
      doc.setTextColor(0, 119, 182);
      doc.setFontSize(16);
      doc.text(inc.ticket_number, margin + 45, 55);

      let y = 68;
      const addSection = (title) => {
        doc.setFillColor(240, 244, 248);
        doc.rect(margin, y - 5, pageW - 2 * margin, 9, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.setTextColor(0, 119, 182);
        doc.text(title, margin + 2, y);
        y += 10;
      };
      const addRow = (label, value) => {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(80, 80, 80);
        doc.text(label + ' :', margin + 2, y);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(30, 30, 30);
        const lines = doc.splitTextToSize(value || 'Non renseigné', pageW - margin - 60);
        doc.text(lines, margin + 55, y);
        y += Math.max(7, lines.length * 5);
      };

      addSection('INFORMATIONS DU DÉCLARANT');
      addRow('Prénom / Nom', `${inc.prenom} ${inc.nom}`);
      addRow('Email', inc.email);
      addRow('Téléphone', inc.telephone || 'Non renseigné');
      addRow('Service', inc.service || 'Non renseigné');

      y += 4;
      addSection('DÉTAILS DE L\'INCIDENT');
      addRow('Type d\'incident', inc.type_incident);
      addRow('Niveau de gravité', inc.gravite);
      addRow('Appareil concerné', inc.appareil || 'Non spécifié');
      addRow('Statut', inc.statut);
      addRow('Date de signalement', new Date(inc.date_creation).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' }));

      y += 4;
      addSection('DESCRIPTION');
      y += 2;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(30, 30, 30);
      const descLines = doc.splitTextToSize(inc.description, pageW - 2 * margin - 4);
      doc.text(descLines, margin + 2, y);

      const pageH = doc.internal.pageSize.getHeight();
      doc.setFillColor(13, 17, 23);
      doc.rect(0, pageH - 18, pageW, 18, 'F');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(139, 148, 158);
      doc.text('© 2026 CyberReport – Document confidentiel – Réservé à l\'administration', margin, pageH - 7);

      doc.save(`admin-rapport-${inc.ticket_number}.pdf`);
    }

    // ── Utilitaires ───────────────────────────────────────────────────────────

    function escapeHtml(text) {
      return (text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadIncident();
  </script>
</body>
</html>
